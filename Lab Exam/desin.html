<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fff;
        }
        form {
            width: 400px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 5px 0;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
        }
        textarea {
            height: 100px;
        }
        button {
            background-color: #333;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .center {
            text-align: center;
        }
    </style>
</head>
<body>
    <form onsubmit="return validateForm()">
        <table>
            <tr>
                <td colspan="2" class="center">
                    <h2>Contact Us</h2>
                </td>
            </tr>
            <tr>
                <td style="width: 50%; padding-right: 5px;">First Name</td>
                <td style="width: 50%; padding-left: 5px;">Last Name</td>
            </tr>
            <tr>
                <td style="padding-right: 5px;"><input type="text" id="firstName"></td>
                <td style="padding-left: 5px;"><input type="text" id="lastName"></td>
            </tr>
            <tr>
                <td colspan="2">Email</td>
            </tr>
            <tr>
                <td colspan="2"><input type="email" id="email"></td>
            </tr>
            <tr>
                <td colspan="2">Mobile Number</td>
            </tr>
            <tr>
                <td colspan="2"><input type="tel" id="mobile"></td>
            </tr>
            <tr>
                <td colspan="2">What do you have in mind?</td>
            </tr>
            <tr>
                <td colspan="2"><textarea id="message" placeholder="What do you have in mind?"></textarea></td>
            </tr>
            <tr>
                <td colspan="2"><button type="submit">Submit</button></td>
            </tr>
        </table>
    </form>

    <script>
        function validateForm() {
            var fields = ['firstName', 'lastName', 'email', 'mobile', 'message'];
            for (var i = 0; i < fields.length; i++) {
                var value = document.getElementById(fields[i]).value.trim();
                if (value === '') {
                    alert("Field Value need to be filled up");
                    return false;
                }
            }
            console.log("First Name: " + document.getElementById('firstName').value);
            console.log("Last Name: " + document.getElementById('lastName').value);
            console.log("Email: " + document.getElementById('email').value);
            console.log("Mobile Number: " + document.getElementById('mobile').value);
            console.log("Message: " + document.getElementById('message').value);
            return false; // Prevent form from submitting to a server
        }
    </script>
</body>
</html>
